# The main pipeline for data_engineering_final_project

resources:
  pipelines:
    data_engineering_final_project_etl:
      name: data_engineering_final_project_etl
      ## Specify the 'catalog' field to configure this pipeline to make use of Unity Catalog:
      # catalog: ${var.catalog}
      schema: ${var.schema}
      root_path: "../src/data_engineering_final_project_etl"

      libraries:
        - glob:
            include: ../src/data_engineering_final_project_etl/transformations/**

      environment:
        dependencies:
          # We include every dependency defined by pyproject.toml by defining an editable environment
          # that points to the folder where pyproject.toml is deployed.
          - --editable ${workspace.file_path}
