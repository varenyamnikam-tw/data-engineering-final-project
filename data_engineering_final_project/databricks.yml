# This is a Databricks asset bundle definition for data_engineering_final_project.
# See https://docs.databricks.com/dev-tools/bundles/index.html for documentation.
bundle:
  name: data_engineering_final_project
  uuid: 8b54487e-3067-45a4-a9ca-3e478716cd28

include:
  - resources/*.yml

artifacts:
  python_artifact:
    type: whl
    build: uv build --wheel

# Variable declarations. These variables are assigned in the dev/prod targets below.
variables:
  catalog:
    description: The catalog to use
  schema:
    description: The schema to use

targets:
  dev:
    # The default target uses 'mode: development' to create a development copy.
    # - Deployed resources get prefixed with '[dev my_user_name]'
    # - Any job schedules and triggers are paused by default.
    # See also https://docs.databricks.com/dev-tools/bundles/deployment-modes.html.
    mode: development
    default: true
    workspace:
      host: https://dbc-ba3cda01-8312.cloud.databricks.com
    variables:
      catalog: hive_metastore
      schema: ${workspace.current_user.short_name}
    presets:
      artifacts_dynamic_version: true
  prod:
    mode: production
    workspace:
      host: https://dbc-ba3cda01-8312.cloud.databricks.com
      # We explicitly deploy to /Workspace/Users/varenyam.nikam@thoughtworks.com to make sure we only have a single copy.
      root_path: /Workspace/Users/varenyam.nikam@thoughtworks.com/.bundle/${bundle.name}/${bundle.target}
    variables:
      catalog: hive_metastore
      schema: prod
    permissions:
      - user_name: varenyam.nikam@thoughtworks.com
        level: CAN_MANAGE
